<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="100%" height="100%">
  <defs>
    <!-- Beef patty gradients -->
    <radialGradient id="pattyGrad" cx="50%" cy="30%" r="65%" fx="45%" fy="25%">
      <stop offset="0%" stop-color="#5B3826" /> <!-- Medium grill brown -->
      <stop offset="45%" stop-color="#3D2314" /> <!-- Rich dark beef brown -->
      <stop offset="100%" stop-color="#1C0D02" /> <!-- Deep charred charcoal/black -->
    </radialGradient>
    <!-- Grill mark gradient -->
    <linearGradient id="grillMarkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0601" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#1F0C02" stop-opacity="0.4" />
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="pattyShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="5.5" flood-color="#1c0d02" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- Textured beef patty shape (uneven perimeter) -->
  <path d="M 50 120 
           C 42 105, 58 90, 80 98
           C 95 90, 110 88, 130 92
           C 150 82, 175 85, 200 90
           C 220 80, 250 82, 275 88
           C 300 80, 335 84, 360 92
           C 385 85, 415 90, 435 102
           C 458 98, 462 115, 450 128
           C 465 142, 455 155, 435 150
           C 425 160, 400 162, 380 156
           C 360 168, 320 172, 290 162
           C 260 174, 210 175, 180 162
           C 150 170, 110 168, 85 156
           C 65 162, 42 150, 52 135
           C 38 128, 42 115, 50 120 Z" 
        fill="url(#pattyGrad)" 
        filter="url(#pattyShadow)" />

  <!-- Textured bumps/craters to look grilled and organic -->
  <g fill="#1C0D02" opacity="0.35">
    <ellipse cx="120" cy="115" rx="15" ry="8" />
    <ellipse cx="220" cy="135" rx="22" ry="10" />
    <ellipse cx="320" cy="110" rx="18" ry="9" />
    <ellipse cx="180" cy="105" rx="12" ry="6" />
    <ellipse cx="280" cy="120" rx="14" ry="7" />
    <ellipse cx="380" cy="130" rx="15" ry="8" />
    <ellipse cx="150" cy="140" rx="10" ry="5" />
    <ellipse cx="300" cy="145" rx="12" ry="6" />
  </g>

  <!-- Diagonal Grill Marks (Charred lines) -->
  <g stroke="url(#grillMarkGrad)" stroke-width="7" stroke-linecap="round" opacity="0.85">
    <line x1="130" y1="100" x2="165" y2="155" />
    <line x1="185" y1="95" x2="220" y2="160" />
    <line x1="240" y1="92" x2="275" y2="162" />
    <line x1="295" y1="92" x2="330" y2="158" />
    <line x1="350" y1="96" x2="385" y2="154" />
  </g>

  <!-- Meat Juice Glistening Highlights -->
  <g fill="#FFFFFF" opacity="0.15">
    <!-- Shiny spots -->
    <ellipse cx="140" cy="110" rx="3" ry="1.5" />
    <ellipse cx="145" cy="113" rx="2" ry="1" />
    <ellipse cx="210" cy="122" rx="4" ry="2" />
    <ellipse cx="215" cy="125" rx="2" ry="1" />
    <ellipse cx="270" cy="108" rx="3" ry="1.5" />
    <ellipse cx="335" cy="120" rx="4" ry="2" />
    <ellipse cx="340" cy="123" rx="2" ry="1" />
    <ellipse cx="170" cy="132" rx="3" ry="1.5" />
    <ellipse cx="290" cy="136" rx="4" ry="2" />
  </g>

  <!-- Extra warm highlight for depth -->
  <path d="M 60 120 C 100 105, 400 105, 440 120 C 400 112, 100 112, 60 120 Z" fill="#8B5A2B" opacity="0.2" />
</svg>
