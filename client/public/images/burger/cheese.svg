<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 240" width="100%" height="100%">
  <defs>
    <!-- Cheddar orange/yellow gradient -->
    <linearGradient id="cheeseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" /> <!-- Warm yellow -->
      <stop offset="60%" stop-color="#F59E0B" /> <!-- Cheddar orange -->
      <stop offset="100%" stop-color="#D97706" /> <!-- Dark melted orange -->
    </linearGradient>
    <!-- Cheese drop shadow -->
    <filter id="cheeseShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="4.5" flood-color="#78350F" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Melted cheese square rotated slightly -->
  <path d="M 120 70 
           C 160 65, 340 60, 380 75
           C 410 85, 420 120, 435 140
           C 445 155, 440 185, 410 180
           C 390 175, 385 160, 350 165
           C 280 175, 230 185, 170 190
           C 140 195, 120 205, 95 195
           C 75 185, 80 145, 70 125
           C 60 105, 90 75, 120 70 Z" 
        fill="url(#cheeseGrad)" 
        filter="url(#cheeseShadow)" />

  <!-- Drips hanging down from corners -->
  <!-- Left corner drip -->
  <path d="M 85 170 C 80 185, 85 220, 95 225 C 105 230, 115 210, 110 190 Z" fill="url(#cheeseGrad)" />
  
  <!-- Right corner drip -->
  <path d="M 415 155 C 425 175, 430 205, 438 210 C 445 215, 452 190, 440 165 Z" fill="url(#cheeseGrad)" />

  <!-- Center front drip (slight melt drip over the patty) -->
  <path d="M 230 183 C 240 195, 245 220, 252 222 C 260 224, 265 195, 260 183 Z" fill="url(#cheeseGrad)" />

  <!-- Inner highlights / glossiness -->
  <g fill="none" stroke="#FEF08A" stroke-width="3" opacity="0.65" stroke-linecap="round">
    <!-- Top-left sheen -->
    <path d="M 125 80 C 160 75, 320 70, 370 85" />
    <path d="M 90 135 C 85 150, 92 170, 95 180" />
  </g>

  <!-- Melted texture shadows (folded look) -->
  <path d="M 170 90 C 200 95, 300 95, 330 90 C 310 98, 190 98, 170 90 Z" fill="#B45309" opacity="0.25" />
  <path d="M 120 120 C 150 125, 220 125, 240 120 C 210 128, 140 128, 120 120 Z" fill="#B45309" opacity="0.25" />
</svg>
