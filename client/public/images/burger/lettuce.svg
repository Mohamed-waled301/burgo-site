<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" width="100%" height="100%">
  <defs>
    <!-- Lettuce gradient -->
    <linearGradient id="lettuceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80" /> <!-- Light green -->
      <stop offset="50%" stop-color="#22C55E" /> <!-- Vibrant green -->
      <stop offset="100%" stop-color="#15803D" /> <!-- Dark forest green -->
    </linearGradient>
    <!-- Darker lettuce shadows -->
    <filter id="lettuceShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#14532D" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Wavy organic lettuce leaf shape -->
  <!-- We'll make it extend slightly wider than the 500px bun for cool overlap -->
  <path d="M 15 100 
           C -5 85, 30 55, 60 70 
           C 90 45, 120 50, 150 75
           C 180 40, 220 45, 260 70
           C 300 45, 340 40, 370 75
           C 400 50, 430 45, 460 70
           C 490 55, 525 85, 505 100
           C 515 125, 485 145, 455 130
           C 425 155, 385 150, 355 125
           C 325 150, 275 160, 245 130
           C 215 155, 165 150, 135 125
           C 105 150, 65 155, 35 130
           C 5 145, -25 125, 15 100 Z" 
        fill="url(#lettuceGrad)" 
        filter="url(#lettuceShadow)" />

  <!-- Secondary overlay curves for fold and leaf veins -->
  <g fill="none" stroke="#86EFAC" stroke-width="2.5" opacity="0.7" stroke-linecap="round">
    <!-- Center stem -->
    <path d="M 260 135 Q 260 100, 255 70" />
    <path d="M 140 120 Q 145 95, 155 75" />
    <path d="M 370 120 Q 365 95, 355 75" />
    
    <!-- Veins -->
    <path d="M 258 115 Q 240 105, 220 100" />
    <path d="M 258 105 Q 275 95, 290 90" />
    <path d="M 256 90 Q 245 80, 230 75" />
    
    <path d="M 143 105 Q 125 95, 105 90" />
    <path d="M 147 95 Q 165 85, 180 80" />
    
    <path d="M 367 105 Q 385 95, 405 90" />
    <path d="M 363 95 Q 345 85, 330 80" />
  </g>

  <!-- Shadow overlays for depth -->
  <path d="M 15 100 C 30 115, 60 120, 85 110 C 120 125, 170 120, 205 105 C 240 125, 290 120, 325 105 C 360 125, 410 120, 445 110 C 470 120, 490 115, 505 100 C 485 110, 465 105, 445 100 C 410 110, 360 115, 325 100 C 290 115, 240 110, 205 100 C 170 115, 120 110, 85 100 C 60 105, 30 110, 15 100 Z" 
        fill="#14532D" 
        opacity="0.25" />
</svg>
