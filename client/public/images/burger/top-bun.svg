<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="100%" height="100%">
  <defs>
    <!-- Bun gradient with 3D spherical feel -->
    <radialGradient id="bunGrad" cx="50%" cy="30%" r="65%" fx="40%" fy="20%">
      <stop offset="0%" stop-color="#FDE047" /> <!-- bright yellow-gold highlight -->
      <stop offset="35%" stop-color="#EAB308" /> <!-- golden amber -->
      <stop offset="75%" stop-color="#CA8A04" /> <!-- rich bronze -->
      <stop offset="100%" stop-color="#713F12" /> <!-- deep toasted brown -->
    </radialGradient>
    <!-- Sesame seed drop shadow -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="1.5" dy="2.5" stdDeviation="1.2" flood-color="#451a03" flood-opacity="0.75"/>
    </filter>
    <!-- Subtle bun glow highlight -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Main Bun Shape -->
  <path d="M 40 210 C 40 70, 460 70, 460 210 C 460 235, 40 235, 40 210 Z" fill="url(#bunGrad)" />

  <!-- Inner highlight curve (top edge highlight) -->
  <path d="M 60 180 C 100 95, 400 95, 440 180 C 390 110, 110 110, 60 180 Z" fill="url(#innerGlow)" />

  <!-- Bottom rim toasted shading -->
  <path d="M 40 210 C 80 228, 420 228, 460 210 C 450 235, 50 235, 40 210 Z" fill="#451a03" opacity="0.35" />

  <!-- Sesame Seeds -->
  <g fill="#FEF3C7" filter="url(#shadow)">
    <!-- Scattered across the bun with custom transforms to rotate/scale -->
    <path d="M 250 85 C 248 82, 247 77, 250 74 C 253 77, 252 82, 250 85" transform="rotate(-5 250 80) scale(1.6)" />
    <path d="M 200 110 C 198 107, 197 102, 200 99 C 203 102, 202 107, 200 110" transform="rotate(25 200 105) scale(1.5)" />
    <path d="M 300 105 C 298 102, 297 97, 300 94 C 303 97, 302 102, 300 105" transform="rotate(-20 300 100) scale(1.5)" />
    <path d="M 150 135 C 148 132, 147 127, 150 124 C 153 127, 152 132, 150 135" transform="rotate(15 150 130) scale(1.6)" />
    <path d="M 350 130 C 348 127, 347 122, 350 119 C 353 122, 352 127, 350 130" transform="rotate(-35 350 125) scale(1.6)" />
    <path d="M 225 140 C 223 137, 222 132, 225 129 C 228 132, 227 137, 225 140" transform="rotate(-10 225 135) scale(1.5)" />
    <path d="M 275 135 C 273 132, 272 127, 275 124 C 278 127, 277 132, 275 135" transform="rotate(40 275 130) scale(1.5)" />
    <path d="M 180 170 C 178 167, 177 162, 180 159 C 183 162, 182 167, 180 170" transform="rotate(-15 180 165) scale(1.5)" />
    <path d="M 320 165 C 318 162, 317 157, 320 154 C 323 157, 322 162, 320 165" transform="rotate(30 320 160) scale(1.6)" />
    <path d="M 250 175 C 248 172, 247 167, 250 164 C 253 167, 252 172, 250 175" transform="rotate(5 250 170) scale(1.5)" />
    <path d="M 120 170 C 118 167, 117 162, 120 159 C 123 162, 122 167, 120 170" transform="rotate(-40 120 165) scale(1.5)" />
    <path d="M 380 160 C 378 157, 377 152, 380 149 C 383 152, 382 157, 380 160" transform="rotate(20 380 155) scale(1.5)" />
    <path d="M 150 195 C 148 192, 147 187, 150 184 C 153 187, 152 192, 150 195" transform="rotate(45 150 190) scale(1.4)" />
    <path d="M 350 190 C 348 187, 347 182, 350 179 C 353 182, 352 187, 350 190" transform="rotate(-25 350 185) scale(1.4)" />
    <path d="M 210 200 C 208 197, 207 192, 210 189 C 213 192, 212 197, 210 200" transform="rotate(-5 210 195) scale(1.5)" />
    <path d="M 290 195 C 288 192, 287 187, 290 184 C 293 187, 292 192, 290 195" transform="rotate(18 290 190) scale(1.5)" />
  </g>
</svg>
